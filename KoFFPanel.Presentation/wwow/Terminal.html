<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden; /* Полностью убираем белые скроллбары Windows */
            background: linear-gradient(320deg, #13151b, #2a0845, #6441A5);
            background-size: 400% 400%;
            animation: aurora 15s ease infinite;
            height: 100vh;
            width: 100vw;
        }

        @keyframes aurora {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        #terminal {
            height: 100%;
            width: 100%;
            padding: 15px;
            box-sizing: border-box;
            background: rgba(19, 21, 27, 0.85); /* Затемняем фон для читабельности */
        }
    </style>
</head>
<body>
    <div id="terminal"></div>
    <script>
        const term = new Terminal({
            theme: {
                background: 'transparent',
                foreground: '#d4d4d4',
                cursor: '#569cd6',
                selectionBackground: 'rgba(38, 79, 120, 0.5)'
            },
            cursorBlink: true,
            fontSize: 15,
            fontFamily: "'Cascadia Code', Consolas, 'Courier New', monospace",
            scrollback: 5000
        });

        // Подключаем плагин автомасштабирования
        const fitAddon = new FitAddon.FitAddon();
        term.loadAddon(fitAddon);

        term.open(document.getElementById('terminal'));
        fitAddon.fit(); // Первая подгонка

        // Адаптивная верстка при изменении размера окна
        window.addEventListener('resize', () => {
            fitAddon.fit();
        });

        // Получаем данные от ядра Linux (через C#) и рисуем в консоли
        window.chrome.webview.addEventListener('message', event => {
            term.write(event.data);
        });

        // Передаем КАЖДОЕ нажатие клавиши (включая стрелки и Tab) в Linux
        term.onData(data => {
            window.chrome.webview.postMessage(data);
        });
    </script>
</body>
</html>
